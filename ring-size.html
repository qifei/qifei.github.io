<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>如何选择戒指指圈的大小</title>
  <script type="text/javascript" src="./assets/marked.umd.js"></script>
  <link rel="stylesheet" href="./assets/github-markdown.css">
  <style>
    .container {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto;
      padding: 45px;
    }

    @media (max-width: 767px) {
      .container {
        padding: 15px;
      }
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #0d1117;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <article class="markdown-body"></article>
  </div>
  <script type="text/javascript">
  var xhr = new XMLHttpRequest();
  xhr.open('GET', './ring-size.md');
  xhr.onreadystatechange = function(e) {
    if(e.target.readyState===4) {
      document.querySelector(".markdown-body").innerHTML = marked.parse(xhr.responseText);
    }
  }
  xhr.send();
  </script>
</body>
</html>
